<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">

<title>Problems</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/g3.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container-fluid mt-3">

<h3>Monitoring Dashboard</h3>

<h5>Problems</h5>

<table class="table table-bordered table-hover">

<thead class="table-light">

<tr>

<th></th>

<th>Job Name</th>

<th>Property</th>

<th>Error</th>

<th>Created</th>

<th>Status</th>

</tr>

</thead>

<tbody>

{% for p in problems %}

<tr>

<td>

<a href="/problem/{{ p.problem_id }}">

🔍

</a>

</td>

<td>

{{ p.job_name }}

</td>

<td>

{{ p.property_name }}

</td>

<td>

{{ p.error_code }}

</td>

<td>

{{ p.creation_date }}

</td>

<td>

Failed

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
