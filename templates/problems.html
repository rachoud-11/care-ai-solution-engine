<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Monitoring Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/g3.css') }}">

</head>

<body>

<div class="top-header">

    <div>

        <h4>Support / Monitoring Dashboard</h4>

    </div>

</div>

<div class="menu-bar">

    <span>Summary</span>

    <span class="active">Problems</span>

    <span>Solutions</span>

    <span>Jobs</span>

    <span>Statistics</span>

    <span>Schedule</span>

</div>

<div class="container-fluid mt-3">

<div class="d-flex justify-content-between">

<h5>Problems</h5>

<button class="btn btn-outline-primary btn-sm">

Actions

</button>

</div>

<table id="problemTable" class="table table-bordered table-hover">

<thead>

<tr>

<th></th>

<th>Job Name</th>

<th>Step Name</th>

<th>Property</th>

<th>Status</th>

<th>Error</th>

<th>Created</th>

</tr>

</thead>

<tbody>

{% for p in problems %}

<tr>

<td>

<button
class="btn btn-sm btn-light"
onclick="viewProblem('{{ p.problem_id }}')">

🔍

</button>

</td>

<td>{{ p.job_name }}</td>

<td>{{ p.step_name }}</td>

<td>{{ p.property_name }}</td>

<td>

<span class="badge bg-danger">

Failed

</span>

</td>

<td>{{ p.error_code }}</td>

<td>{{ p.creation_date }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>

<script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script>

<script>

new DataTable('#problemTable');

function viewProblem(id){

window.open("/problem/"+id,"_blank");

}

</script>

</body>

</html>
